name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/muntum-key.pem
          chmod 600 ~/.ssh/muntum-key.pem

      - name: Upload JAR to EC2
        run: |
          scp -i ~/.ssh/muntum-key.pem \
            -o StrictHostKeyChecking=no \
            build/libs/muntum-*.jar \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ubuntu/muntum/app/muntum.jar

      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/muntum-key.pem \
            -o StrictHostKeyChecking=no \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "sudo systemctl restart muntum && sudo systemctl status muntum"